services:
  glov-secure-mnemonic-shards:
    build:
      context: .
      dockerfile: Dockerfile
    image: glov-secure-mnemonic-shards:latest
    container_name: glov-secure-mnemonic-shards-app
    init: true
    ports:
      - "8848:8848"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
